# ============================================================================
# 前端 nginx 站点配置
#   - / 静态资源 + SPA fallback
#   - /api 反代 FastAPI（支持 SSE：禁缓存、proxy_buffering off）
#   - /preview /files 反代后端文件接口
#   - 容器内通过 docker compose 服务名 backend 解析后端地址
# ============================================================================

# SSE/长连需要 worker 充足，alpine 默认 1024 通常够，业务量大时调高
# worker_connections 1024;

upstream resume_backend {
    # docker compose 自带的 DNS 会把 backend 解析到后端容器；多实例时自动负载均衡
    server backend:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # 上传简历用，默认 1m 不够
    client_max_body_size 50m;

    # 安全 header（最小集合，不影响功能）
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # gzip 静态资源
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript application/javascript
        application/json application/xml application/wasm
        image/svg+xml font/woff font/woff2;

    root /usr/share/nginx/html;
    index index.html;

    # 静态资源：hash 文件名长缓存；index.html 不缓存（每次拿最新版本）
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store" always;
    }

    # SPA fallback：所有非接口路径都回 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ---- 后端接口 ----
    # FastAPI 全部挂在 /api/v1 下（含 /api/v1/preview/<file>），nginx 只反代 /api/
    location /api/ {
        proxy_pass http://resume_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE / 长轮询：关 buffer，超时调大
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 30s;

        # 上传文件需要的 body 大小
        client_max_body_size 50m;
    }

    # nginx 自身存活探针，运维侧用
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # 兼容 vite 开发模式下的 /preview/... 直链（实际路由在 /api/v1/preview 下）
    # 前端目前未调用 resumePreviewApi.getUrl，留作兼容
    location /preview/ {
        rewrite ^/preview/(.*)$ /api/v1/preview/$1 break;
        proxy_pass http://resume_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
