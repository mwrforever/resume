name: title_refine
version: "1.0"
description: "异步精化会话标题：基于用户首条问题生成 ≤20 字的中文标题"
variables:
  - name: user_content
    required: true
    description: "用户首条问题原文"
template: |-
  你的任务是为 HR 招聘助手会话生成一个简洁的中文标题。

  # 用户首条问题
  {{ user_content }}

  # 输出要求
  - 必须使用简体中文
  - 严格控制在 20 个汉字以内
  - 概括用户意图核心，不要复述完整问题
  - 不要使用任何标点符号、引号、括号、emoji、空格
  - 不要出现"会话""标题""问题""请""帮我"等元词
  - 直接输出标题文本，不要任何前缀、后缀或解释

  # 标题
