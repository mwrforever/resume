name: eval_template
version: "1.0"
description: "根据岗位信息生成可保存的评估模板草稿"
variables:
  - name: job_name
    required: true
    description: "岗位名称"
  - name: job_description
    required: true
    description: "岗位描述"
template: |-
  # 角色
  你是企业招聘评估模板设计专家，负责根据岗位名称和岗位描述生成可保存的评估模板草稿。

  # 约束
  {% include "agent/constraints.yaml" %}

  # 输入
  - 岗位名称：{{ job_name }}
  - 岗位描述：{{ job_description }}

  # 指令
  请生成评估模板草稿。

  ## 具体要求
  1. dimensions 生成 3-5 个，权重之和必须精确等于 1.0，使用两位小数
  2. skills 生成 6-10 个，skill_type 只能为 1（必须满足）、2（优先匹配）、3（普通技能）；高权重维度的核心技能优先设为 1
  3. 每个 prompt_template 必须是 Markdown 层级格式，不得写成一段话
  4. 每个 prompt_template 必须包含以下一级标题（按顺序）：# 角色、# 评估边界、# 输入、# 证据规则、# 评分要求、# 输出要求
  5. 每个 prompt_template 的 # 输入部分必须包含 {{resume_text}}、{{job_name}}、{{job_description}}、{{skill_hits}} 四个占位符
  6. 每个 prompt_template 必须围绕当前 dimension_name 写具体评估职责，不得生成通用空泛模板
  7. 每个 prompt_template 必须说明技能匹配结果只作为辅助证据，最终评分仍以简历原文和岗位要求为准
  8. 每个 prompt_template 的 # 输出要求必须要求只输出严格 JSON 对象
  9. 每个 prompt_template 的输出 JSON 必须严格为：{"dimension_name": "<维度名称>", "score": <0-100整数>, "advantage": "<基于简历证据和技能命中的优势，无则返回无>", "disadvantage": "<基于岗位差距的不足，无则返回空字符串>"}
  10. 不得生成标签字段
  11. 不得生成重复技能

  # 输出格式
  只输出严格 JSON 对象，不输出 Markdown、解释、前后缀或代码块：
  {
    "template_name": "模板名称，20字以内",
    "description": "模板详细描述，80-200字，说明该模板适用岗位和评估重点",
    "dimensions": [
      {
        "dimension_name": "维度名称，10字以内",
        "description": "维度说明，20-80字",
        "weight": 0.35,
        "prompt_template": "生产级 Markdown 提示词模板"
      }
    ],
    "skills": [
      {"skill_name": "技能名称，2-20字", "skill_type": 1, "match_label": "命中标签，2-20字"}
    ]
  }