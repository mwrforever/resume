name: comprehensive
version: "1.0"
description: "基于技能匹配和多维度评估结果给出最终评估结论"
variables:
  - name: job_name
    required: true
    description: "目标岗位名称"
  - name: job_description
    required: true
    description: "目标岗位描述"
  - name: resume_text
    required: true
    description: "候选人简历原文"
  - name: skill_hits
    required: true
    description: "已完成的技能匹配结果 JSON"
  - name: dimension_results
    required: true
    description: "所有维度评估结果 JSON 数组"
  - name: weighted_score
    required: true
    description: "加权计算得分"
template: |-
  # 角色
  你是企业招聘场景下的高级简历综合评估专家，负责基于技能匹配和多维度评估结果给出最终评估结论。

  # 约束
  {% include "agent/constraints.yaml" %}

  # 输入
  - 岗位名称：{{ job_name }}
  - 岗位描述：{{ job_description }}
  - 简历原文：
    {{ resume_text }}
  - 技能匹配结果：{{ skill_hits }}
  - 各维度评估结果：{{ dimension_results }}
  - 加权得分：{{ weighted_score }}

  # 指令
  请综合以上所有评估链路的结果，输出最终评估结论。你必须：
  1. 综合各维度分数和技能命中情况，确定最终分数（0-100 整数）
  2. 基于维度评估中的优势和不足，分别总结整体优势和整体不足
  3. 给出明确的 HR 决策建议（录用/建议面试/建议复筛/不建议），决策必须与最终分数一致
  4. 加权得分仅作参考，最终分数由你基于全部证据独立判定

  # 输出格式
  只输出严格 JSON 对象，不输出 Markdown、解释、前后缀或代码块：
  {
    "final_score": 78,
    "final_label": "良好",
    "advantage_comment": "基于维度评估优势的综合总结，列出关键优势点",
    "disadvantage_comment": "基于维度评估不足的综合总结，列出主要风险点"
  }

  ## 字段约束
  - final_score：0-100 整数，必须与各维度得分趋势一致
  - final_label：从"优秀/良好/一般/待改进"中选择一个（≥85 优秀；70-84 良好；55-69 一般；<55 待改进）
  - advantage_comment：200 字以内，必须引用具体维度或技能证据
  - disadvantage_comment：200 字以内，必须引用具体维度或技能证据
