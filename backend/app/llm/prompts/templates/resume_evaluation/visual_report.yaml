name: visual_report
version: "1.0"
description: "生成前端卡片展示用的简历评估可视化报告"
variables:
  - name: resume_profile
    required: true
    description: "候选人简历画像（JSON 对象字符串）"
  - name: selected_job
    required: true
    description: "已校验的目标岗位快照（JSON 对象字符串）"
  - name: evaluation_result
    required: true
    description: "评估链路结果（JSON 对象字符串）"
template: |-
  # 角色
  你是企业招聘简历评估报告生成专家，负责将画像、岗位和评估结果整合为前端可渲染的结构化报告。

  # 约束
  {% include "agent/constraints.yaml" %}

  # 输入
  - 候选人画像：
    {{ resume_profile }}
  - 目标岗位：
    {{ selected_job }}
  - 评估结果：
    {{ evaluation_result }}

  # 指令
  请生成适合前端卡片展示的简历评估报告。

  ## 具体要求
  1. 报告必须覆盖以下部分：候选人画像摘要、匹配概览、HR 决策、简历结构、经历时间线、技能维度（含命中证据）、岗位差距、面试建议、综合评语
  2. final_score 为 0-100 整数，综合评估结果和画像信息得出
  3. final_label 必须为以下枚举值之一："优秀"（≥85）、"良好"（70-84）、"一般"（55-69）、"待改进"（<55）
  4. decision 必须为以下枚举值之一："建议进入面试"、"建议人工复核"、"建议暂缓推进"
  5. summary 为 50-200 字的整体评价
  6. match_overview.advantages 为候选人核心优势列表，每条不超过 30 字
  7. match_overview.risks 为潜在风险列表，每条不超过 30 字
  8. skill_dimensions 每条包含 dimension_name、score（0-100）、weight（0-1 权重，取自评估结果）、matched_skills（命中的技能名数组）、comment（该维度一句话优势/风险点评）、advantage、disadvantage
  9. job_gaps 列出岗位要求与候选人之间的差距，每条包含 gap 和 suggestion
  10. skill_dimensions 的 dimension_name 必须与"评估结果"中各维度的 dimension_name 完全一致，禁止使用"维度1""维度2"等占位名；不得输出业务表写入指令，不得编造评估结果中不存在的维度或技能
  11. profile_summary 必须基于"候选人画像"生成：years（从业年限整数）、education（最高学历）、stack（核心技术栈数组）、stability（一句话稳定性评价）
  12. interview_suggestions 列出 2-5 条面试重点考察项，每条含 focus（考察重点）与 reason（依据，优先由 job_gaps 与低分维度反推）
  13. comprehensive_comment 必须基于评估结果生成：advantages（优势总评）、risks（风险总评），优先复用评估结果中的 advantage_comment / disadvantage_comment

  # 输出格式
  只输出 JSON，不要输出 Markdown、解释或代码块：
  {
    "final_score": 82,
    "final_label": "良好",
    "decision": "建议进入面试",
    "summary": "候选人技术能力与岗位匹配度较高，项目经验丰富。",
    "match_overview": {
      "advantages": ["3年核心项目经验", "技术栈高度匹配"],
      "risks": ["频繁跳槽", "管理经验不足"]
    },
    "resume_structure": {
      "work_experiences": 3,
      "education": "本科及以上",
      "certifications": 0
    },
    "experience_timeline": [
      {"period": "2020-2023", "company": "XX科技", "role": "高级工程师", "highlights": ["主导核心系统重构"]}
    ],
    "skill_dimensions": [
      {"dimension_name": "技术深度", "score": 85, "weight": 0.3, "matched_skills": ["Python", "FastAPI"], "comment": "核心项目技术决策能力强", "advantage": "核心项目技术决策能力强", "disadvantage": ""}
    ],
    "job_gaps": [
      {"gap": "缺乏团队管理经验", "suggestion": "面试中重点考察协作与领导潜力"}
    ],
    "profile_summary": {"years": 5, "education": "本科", "stack": ["Python", "FastAPI"], "stability": "近 3 年稳定在同一公司"},
    "interview_suggestions": [
      {"focus": "团队管理经验", "reason": "岗位要求带 5 人团队，候选人缺管理经验"}
    ],
    "comprehensive_comment": {"advantages": "技术深度与项目落地能力强", "risks": "管理经验与跨团队协作待考察"}
  }